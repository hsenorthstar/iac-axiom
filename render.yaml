# One-click deploy to Render — https://render.com
# In Render: New → Blueprint → connect this repo. Render reads this file.
# Free-tier compatible (no persistent disk). The app auto-seeds on boot; the
# SQLite file lives in /tmp, which resets on redeploy/spin-down. To make data
# durable, either: (a) add a `disk:` block + change `plan` to `starter`, or
# (b) swap to a managed Postgres (see README "Upgrading to Postgres").
services:
  - type: web
    name: iac-axiom
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/projects
    envVars:
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: DATABASE_PATH
        value: /tmp/iac.db
