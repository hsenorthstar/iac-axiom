# One-click deploy to Render — https://render.com (free tier works).
# In Render: New → Blueprint → connect this repo. Render reads this file.
services:
  - type: web
    name: iac-axiom
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/projects
    envVars:
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: DATABASE_PATH
        value: /var/data/iac.db
    disk:
      name: iac-data                 # persistent disk so the DB survives redeploys
      mountPath: /var/data
      sizeGB: 1
